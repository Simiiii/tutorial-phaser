services:
  server:
    build:
      context: ./server
      target: dev
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: development
    # --watch src watches the whole src/ directory so dynamically-loaded files
    # (e.g. app.config.ts loaded by @colyseus/tools) also trigger a restart.
    command: ["npx", "tsx", "watch", "--watch", "src", "src/index.ts"]
    develop:
      watch:
        - action: sync           # compose copies changed files into the container;
          path: ./server/src     # tsx --watch src detects them and restarts
          target: /app/src
        - action: sync+restart   # tsconfig changes need a process restart
          path: ./server/tsconfig.json
          target: /app/tsconfig.json
        - action: rebuild        # dependency changes need a full image rebuild
          path: ./server/package.json
        - action: rebuild
          path: ./server/package-lock.json

  client:
    build:
      context: ./client
      target: dev
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
    develop:
      watch:
        - action: sync           # Vite HMR picks up synced source changes
          path: ./client/src
          target: /app/src
        - action: sync+restart   # html/config changes need a Vite restart
          path: ./client/index.html
          target: /app/index.html
        - action: sync+restart
          path: ./client/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild        # dependency changes need a full image rebuild
          path: ./client/package.json
        - action: rebuild
          path: ./client/package-lock.json
